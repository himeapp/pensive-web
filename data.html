<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>데이터 뷰어 · Mind Cleanse</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0014; color: #ddd6ff;
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh; padding: 32px 24px;
    }
    h1 { font-size: 22px; font-weight: 700; color: #c49fff; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: rgba(180,160,220,.5); margin-bottom: 28px; }

    /* login */
    #login-section { max-width: 360px; margin: 100px auto; text-align: center; }
    #login-section p { font-size: 14px; color: rgba(180,160,220,.6); margin-bottom: 20px; }
    #btn-login {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px;
      background: rgba(10,5,30,.9); border: 1px solid rgba(120,80,220,.4);
      border-radius: 30px; color: rgba(200,180,255,.9);
      font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .2s;
    }
    #btn-login:hover { border-color: rgba(160,100,255,.7); color: #d8b8ff; }

    #main-section { display: none; max-width: 900px; margin: 0 auto; }

    /* tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 22px; }
    .tab {
      padding: 7px 18px; border-radius: 20px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1px solid rgba(120,80,220,.3);
      background: transparent; color: rgba(180,150,255,.6);
      font-family: 'Noto Sans KR', sans-serif; transition: all .2s;
    }
    .tab.active { background: rgba(100,50,200,.25); border-color: rgba(160,100,255,.55); color: #c8a0ff; }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* stats bar */
    .stats-bar {
      display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px;
    }
    .stat-chip {
      background: rgba(80,40,140,.2); border: 1px solid rgba(120,80,200,.25);
      border-radius: 12px; padding: 10px 18px;
    }
    .stat-chip .label { font-size: 11px; color: rgba(180,160,220,.5); margin-bottom: 2px; }
    .stat-chip .value { font-size: 22px; font-weight: 700; color: #c49fff; }

    /* table */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      text-align: left; font-size: 11px; font-weight: 600;
      color: rgba(180,160,220,.45); padding: 8px 10px;
      border-bottom: 1px solid rgba(120,80,200,.15);
    }
    .data-table td {
      padding: 10px 10px; font-size: 13px;
      border-bottom: 1px solid rgba(120,80,200,.08);
      vertical-align: top;
    }
    .data-table tr:hover td { background: rgba(80,40,140,.12); }
    .uid-cell { font-size: 11px; color: rgba(160,140,210,.5); font-family: monospace; }
    .thought-chip {
      display: inline-block; padding: 2px 8px; border-radius: 10px; margin: 2px;
      font-size: 11px; background: rgba(80,40,140,.25); border: 1px solid rgba(120,80,200,.25);
      color: rgba(190,170,240,.8);
    }
    .thought-chip.category { background: rgba(100,50,180,.3); font-weight: 600; }
    .date-cell { font-size: 11px; color: rgba(160,140,210,.45); white-space: nowrap; }
    .feedback-text { line-height: 1.6; color: rgba(220,210,255,.85); }
    .empty-msg { text-align: center; padding: 40px; color: rgba(160,140,210,.4); font-size: 14px; }

    #refresh-btn {
      padding: 7px 16px; border-radius: 20px;
      background: transparent; border: 1px solid rgba(120,80,220,.3);
      color: rgba(180,150,255,.65); font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px; cursor: pointer; transition: all .2s; margin-left: auto;
    }
    #refresh-btn:hover { border-color: rgba(160,100,255,.6); color: #c0a0ff; }
    .top-bar { display: flex; align-items: center; margin-bottom: 20px; }
    #logout-btn {
      padding: 5px 12px; border-radius: 20px; margin-left: 10px;
      background: transparent; border: 1px solid rgba(120,80,200,.2);
      color: rgba(160,130,210,.45); font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px; cursor: pointer; transition: all .2s;
    }
    #logout-btn:hover { color: rgba(200,160,255,.8); }

    .loading { text-align: center; padding: 30px; color: rgba(160,140,210,.4); }
  </style>
</head>
<body>

<!-- Login gate -->
<div id="login-section">
  <h1 style="margin-bottom:12px;">🔐 데이터 뷰어</h1>
  <p>Google 계정으로 로그인해서<br>앱 데이터를 확인하세요</p>
  <button id="btn-login">
    <svg width="16" height="16" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
      <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
      <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
      <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
    </svg>
    Google 로그인
  </button>
</div>

<!-- Main data view -->
<div id="main-section">
  <div class="top-bar">
    <div>
      <h1>📊 데이터 뷰어</h1>
      <p class="subtitle">마음 정화 공간 · 실시간 데이터</p>
    </div>
    <button id="refresh-btn">↻ 새로고침</button>
    <button id="logout-btn">로그아웃</button>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-chip"><div class="label">총 유저</div><div class="value" id="stat-users">-</div></div>
    <div class="stat-chip"><div class="label">총 피드백</div><div class="value" id="stat-feedback">-</div></div>
    <div class="stat-chip"><div class="label">총 정화 (전체)</div><div class="value" id="stat-total">-</div></div>
    <div class="stat-chip"><div class="label">총 관념 (현재)</div><div class="value" id="stat-nodes">-</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="feedback-tab">💬 피드백</button>
    <button class="tab" data-tab="users-tab">👥 유저 데이터</button>
  </div>

  <!-- Feedback pane -->
  <div class="tab-pane active" id="feedback-tab">
    <div id="feedback-loading" class="loading">불러오는 중...</div>
    <table class="data-table" id="feedback-table" style="display:none">
      <thead><tr>
        <th style="width:55%">내용</th>
        <th>유저</th>
        <th>시간</th>
      </tr></thead>
      <tbody id="feedback-tbody"></tbody>
    </table>
    <div id="feedback-empty" class="empty-msg" style="display:none">아직 피드백이 없어요</div>
  </div>

  <!-- Users pane -->
  <div class="tab-pane" id="users-tab">
    <div id="users-loading" class="loading">불러오는 중...</div>
    <table class="data-table" id="users-table" style="display:none">
      <thead><tr>
        <th>UID</th>
        <th>현재 관념들</th>
        <th>오늘/총 정화</th>
        <th>마지막 업데이트</th>
      </tr></thead>
      <tbody id="users-tbody"></tbody>
    </table>
    <div id="users-empty" class="empty-msg" style="display:none">데이터가 없어요</div>
  </div>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCOX2NmodMHsMzhrnhCMY-gVqCICplaoIs",
  authDomain:        "pensive-web-553d7.firebaseapp.com",
  projectId:         "pensive-web-553d7",
  storageBucket:     "pensive-web-553d7.firebasestorage.app",
  messagingSenderId: "526154313393",
  appId:             "1:526154313393:web:5b3ab9d35b3c8b65b63c90"
};

firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.firestore();

auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('main-section').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('login-section').style.display = 'block';
    document.getElementById('main-section').style.display = 'none';
  }
});

document.getElementById('btn-login').addEventListener('click', () => {
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
      .catch(e => alert('로그인 실패: ' + e.message));
});
document.getElementById('logout-btn').addEventListener('click', () => auth.signOut());
document.getElementById('refresh-btn').addEventListener('click', loadAll);

// Tabs
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});

function fmtDate(ts){
  if(!ts) return '-';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
}

async function loadAll(){
  await Promise.all([loadFeedback(), loadUsers()]);
}

async function loadFeedback(){
  document.getElementById('feedback-loading').style.display = 'block';
  document.getElementById('feedback-table').style.display = 'none';
  document.getElementById('feedback-empty').style.display = 'none';
  try {
    const snap = await db.collection('feedback').orderBy('createdAt','desc').limit(200).get();
    document.getElementById('stat-feedback').textContent = snap.size;
    const tbody = document.getElementById('feedback-tbody');
    tbody.innerHTML = '';
    if(snap.empty){
      document.getElementById('feedback-empty').style.display = 'block';
    } else {
      snap.forEach(doc => {
        const d = doc.data();
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="feedback-text">${escHtml(d.text||'')}</td>
          <td class="uid-cell">${escHtml((d.uid||'').slice(0,12))}…</td>
          <td class="date-cell">${fmtDate(d.createdAt)}</td>
        `;
        tbody.appendChild(tr);
      });
      document.getElementById('feedback-table').style.display = 'table';
    }
  } catch(e) {
    document.getElementById('feedback-tbody').innerHTML = `<tr><td colspan="3" class="empty-msg">오류: ${e.message}</td></tr>`;
    document.getElementById('feedback-table').style.display = 'table';
  }
  document.getElementById('feedback-loading').style.display = 'none';
}

async function loadUsers(){
  document.getElementById('users-loading').style.display = 'block';
  document.getElementById('users-table').style.display = 'none';
  document.getElementById('users-empty').style.display = 'none';
  try {
    const snap = await db.collection('users').orderBy('updatedAt','desc').limit(300).get();
    document.getElementById('stat-users').textContent = snap.size;
    let totalPurified = 0, totalNodes = 0;
    const tbody = document.getElementById('users-tbody');
    tbody.innerHTML = '';
    if(snap.empty){
      document.getElementById('users-empty').style.display = 'block';
    } else {
      snap.forEach(doc => {
        const d = doc.data();
        const nodes = Array.isArray(d.nodes) ? d.nodes : [];
        totalPurified += (d.total || 0);
        totalNodes += nodes.length;

        // Render nodes as chips
        const cats = nodes.filter(n => n.isCategory);
        const thoughts = nodes.filter(n => !n.isCategory);
        let chips = cats.map(n => `<span class="thought-chip category">${escHtml(n.text||'')}</span>`).join('');
        chips += thoughts.slice(0, 8).map(n => `<span class="thought-chip">${escHtml(n.text||'')}</span>`).join('');
        if(thoughts.length > 8) chips += `<span class="thought-chip">+${thoughts.length-8}개</span>`;
        if(!chips) chips = '<span style="color:rgba(160,140,210,.35);font-size:11px">관념 없음</span>';

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="uid-cell">${doc.id.slice(0,14)}…</td>
          <td>${chips}</td>
          <td style="font-size:13px;white-space:nowrap">
            <span style="color:#c49fff;font-weight:600">${d.daily||0}</span>
            <span style="color:rgba(160,140,210,.4)"> / </span>
            <span style="color:#e0d0ff">${d.total||0}</span>
          </td>
          <td class="date-cell">${fmtDate(d.updatedAt)}</td>
        `;
        tbody.appendChild(tr);
      });
      document.getElementById('stat-total').textContent = totalPurified;
      document.getElementById('stat-nodes').textContent = totalNodes;
      document.getElementById('users-table').style.display = 'table';
    }
  } catch(e) {
    document.getElementById('users-tbody').innerHTML = `<tr><td colspan="4" class="empty-msg">오류: ${e.message}<br><small>Firestore 보안 규칙에서 읽기 허용이 필요해요</small></td></tr>`;
    document.getElementById('users-table').style.display = 'table';
  }
  document.getElementById('users-loading').style.display = 'none';
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
