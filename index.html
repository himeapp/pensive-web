<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>마음 정화 공간 · Mind Cleanse</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore-compat.js"></script>
  <style>
/* ==================== BASE ==================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; min-height: 100dvh; overflow: hidden;
  background: #000011;
  font-family: 'Noto Sans KR', sans-serif;
  color: #e0e0ff;
}
#three-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  min-height: 100dvh; display: block;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}
#labels-container {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  min-height: 100dvh;
  pointer-events: none; z-index: 10;
}

/* ==================== NODE LABELS ==================== */
.node-label {
  position: absolute; pointer-events: none;
  /* 구슬(투영 중심) 바로 위: 라벨 높이가 커져도 간격이 과해지지 않음 */
  transform: translate(-50%, calc(-100% - 10px));
  text-shadow: 0 0 8px currentColor;
  text-align: center; line-height: 1.4;
}
.node-label.category { font-size: 15px; font-weight: 700; padding: 5px 14px; border-radius: 20px; white-space: nowrap; }
.node-label.thought  {
  font-size: 13px; font-weight: 400; padding: 5px 11px;  border-radius: 12px; opacity: 1; white-space: normal; max-width: 180px; word-break: keep-all;
  pointer-events: auto;
  cursor: pointer;
  transition: box-shadow .2s, border-color .2s, background .2s, transform .2s;
}
@media (max-width: 560px) {
  .node-label.thought {
    font-size: 12px;
    padding: 7px 12px;
    max-width: min(200px, 78vw);
    min-height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translate(-50%, calc(-100% - 10px));
    -webkit-tap-highlight-color: transparent;
  }
}
.node-label.thought.is-selected {
  box-shadow: 0 0 0 2px rgba(255, 255, 255, .85), 0 0 22px rgba(200, 180, 255, .75);
  transform: translate(-50%, calc(-100% - 10px)) scale(1.04);
}

/* ==================== HAND CURSOR ==================== */
#hand-cursor {
  position: fixed; pointer-events: none; z-index: 9999;
  display: none;
  transform: translate(-23px, -3px); /* hotspot: index fingertip */
  /* 입체·그림자는 SVG 필터·내부 그라데이션으로 처리 */
  transition: opacity .12s;
}
#hand-cursor.show { display: block; }
#hand-cursor svg { display: block; }

/* idle: very subtle organic float — breathing-like, not mechanical */
@keyframes hand-idle {
  0%   { transform: translate(-23px,-5px) rotate(-3deg); }
  30%  { transform: translate(-23px, -2px) rotate( 2deg); }
  65%  { transform: translate(-23px, -6px) rotate(-1deg); }
  100% { transform: translate(-23px, -5px) rotate(-3deg); }
}
#hand-cursor.idle    { animation: hand-idle 3.8s ease-in-out infinite; }
/* petting rotation is driven by JS (velocity-based) — no CSS needed */
#hand-cursor.petting { animation: none; }

/* Stroke progress badge */
.stroke-badge {
  position: absolute; pointer-events: none;
  transform: translate(-50%, 120%);
  font-size: 13px; font-weight: 800;
  color: #fff;
  text-shadow: 0 0 14px rgba(255,220,100,1), 0 0 28px rgba(255,160,0,.7);
  white-space: nowrap; z-index: 15;
  animation: pulse-badge .4s ease infinite alternate;
}
@keyframes pulse-badge { from { opacity:.7; transform:translate(-50%,120%) scale(.95); } to { opacity:1; transform:translate(-50%,120%) scale(1.05); } }

/* ==================== INPUT OVERLAY ==================== */
#input-overlay {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center;
  justify-content: flex-start;
  overflow-x: hidden;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: max(12px, env(safe-area-inset-top, 0px)) max(12px, env(safe-area-inset-right, 0px)) max(12px, env(safe-area-inset-bottom, 0px)) max(12px, env(safe-area-inset-left, 0px));
  box-sizing: border-box;
  z-index: 100;
  background: radial-gradient(ellipse at center, rgba(20,0,60,.97) 0%, rgba(0,0,17,.99) 100%);
  transition: opacity .6s, visibility .6s;
}
#input-overlay.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  /* 숨김 후에도 레이어가 위에 남으면 터치·합성 이슈가 있을 수 있어 아래로 내림 */
  z-index: 30;
}

.input-card {
  width: 92%; max-width: 560px;
  flex-shrink: 0;
  margin-top: auto; margin-bottom: auto;
  background: rgba(10,5,30,.92);
  border: 1px solid rgba(120,60,255,.3);
  border-radius: 24px;
  padding: 36px 36px 32px;
  box-shadow: 0 0 70px rgba(100,0,255,.18), 0 0 140px rgba(80,0,200,.1);
  backdrop-filter: blur(24px);
}
.app-logo { font-size: 32px; display: block; text-align: center; margin-bottom: 5px; }
.app-title {
  font-size: 24px; font-weight: 700; text-align: center;
  background: linear-gradient(135deg, #cc88ff, #6644ff, #44aaff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 4px;
}
.app-subtitle {
  font-size: 13px; color: rgba(180,160,220,.65); text-align: center; margin-bottom: 22px;
  max-width: 100%; line-height: 1.55;
  word-break: keep-all; overflow-wrap: break-word;
}

.input-section-label {
  font-size: 12px; font-weight: 500; color: rgba(180,160,220,.7);
  margin-bottom: 8px; display: block;
}
#thought-input {
  width: 100%; min-height: 220px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(120,80,220,.25);
  border-radius: 14px;
  color: #e8e4ff;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px; line-height: 1.8;
  padding: 16px 18px;
  resize: vertical; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
#thought-input::placeholder {
  color: rgba(160,140,210,.55);
  font-size: 13px;
  line-height: 1.65;
  opacity: 1;
}
#thought-input:focus {
  border-color: rgba(140,80,255,.55);
  box-shadow: 0 0 24px rgba(120,60,255,.14);
}
.input-hint {
  font-size: 12px; color: rgba(160,140,220,.68);
  margin-top: 8px; margin-bottom: 2px;
  max-width: 100%; line-height: 1.55;
  word-break: keep-all; overflow-wrap: break-word;
  text-align: center;
}
.btn-primary {
  width: 100%; margin-top: 18px; padding: 15px;
  background: linear-gradient(135deg,#7733ff,#4422cc);
  border: none; border-radius: 12px; color: #fff;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all .2s;
  box-shadow: 0 4px 22px rgba(100,50,255,.3);
}
.btn-primary:hover { background: linear-gradient(135deg,#8844ff,#5533dd); transform: translateY(-1px); box-shadow: 0 6px 30px rgba(120,60,255,.45); }
.divider {
  display: flex; align-items: center; gap: 12px; margin: 18px 0 14px;
}
.divider::before,.divider::after { content:''; flex:1; height:1px; background:rgba(120,80,200,.18); }
.divider span { font-size: 12px; color: rgba(140,110,200,.35); }
.btn-enter {
  width: 100%; padding: 11px;
  background: transparent; border: 1px solid rgba(120,80,220,.25);
  border-radius: 12px; color: rgba(180,150,255,.7);
  font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all .2s;
}
.btn-enter:hover { background: rgba(80,40,160,.2); border-color: rgba(160,100,255,.5); color: #c0a0ff; }
#enter-space-btn { display: none; }
#enter-space-btn.visible { display: block; }

/* ==================== SPACE UI ==================== */
#space-ui {
  position: fixed; inset: 0; pointer-events: none; z-index: 20; transition: opacity .6s;
}
#space-ui.hidden { opacity: 0; pointer-events: none; }

#hud-top {
  position: absolute;
  top: calc(20px + env(safe-area-inset-top, 0px));
  left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 14px;
  background: rgba(0,0,10,.76); border: 1px solid rgba(100,60,200,.22);
  border-radius: 40px; padding: 9px 20px;
  backdrop-filter: blur(14px); pointer-events: auto; white-space: nowrap;
}
#hud-title {
  font-size: 13px; font-weight: 700;
  color: #9966ff; letter-spacing: .4px;
}
.hud-div { width: 1px; height: 16px; background: rgba(255,255,255,.1); }
.hud-stat { font-size: 12px; color: rgba(180,160,220,.85); }
.hud-stat strong { color: #e8d8ff; font-weight: 600; }
.hud-progress-wrap { display: flex; align-items: center; gap: 6px; }
.hud-bar { width: 72px; height: 7px; background: rgba(255,255,255,.13); border-radius: 4px; overflow: hidden; }
.hud-fill { height: 100%; width: 0%; background: linear-gradient(90deg,#7733ff,#cc88ff); border-radius: 3px; transition: width .5s ease; }

/* 모바일: 상단 HUD가 우측 구글 로그인과 가로로 겹치지 않도록 영역 분리 */
@media (max-width: 560px) {
  #hud-top {
    left: max(10px, env(safe-area-inset-left, 0px));
    right: calc(max(10px, env(safe-area-inset-right, 0px)) + min(54vw, 220px));
    transform: none;
    flex-wrap: wrap;
    justify-content: flex-start;
    white-space: normal;
    row-gap: 6px;
    column-gap: 8px;
    padding: 8px 12px;
    border-radius: 22px;
    box-sizing: border-box;
  }
  #hud-title { font-size: 11px; letter-spacing: 0.2px; }
  .hud-stat { font-size: 10px; }
  .hud-bar { width: 52px; }
  .hud-div { height: 14px; }
}

/* ==================== DETAIL PANEL (우측 · 세로 중앙) ==================== */
#detail-panel {
  position: absolute;
  left: auto;
  right: max(8px, env(safe-area-inset-right, 0px));
  top: 50%;
  bottom: auto;
  transform: translateY(-50%);
  width: calc(100vw - 16px);
  max-width: 220px;
  height: fit-content;
  min-height: 0;
  max-height: calc(100vh - 120px - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
  box-sizing: border-box;
  z-index: 25;
  background: rgba(6, 2, 18, .94);
  border: 1px solid rgba(130, 80, 230, .32);
  border-radius: 14px;
  padding: 17px 15px 16px;
  backdrop-filter: blur(20px);
  box-shadow: -6px 0 28px rgba(60, 0, 140, .32), 0 0 1px rgba(200, 180, 255, .18);
  pointer-events: auto;
  overflow-x: hidden;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transition: opacity .28s ease, transform .32s cubic-bezier(.34, 1.2, .64, 1), visibility .32s;
}
#detail-panel.hidden {
  opacity: 0;
  visibility: hidden;
  transform: translateY(-50%) translateX(14px);
}

.dp-stack {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 9px;
}

.dp-head {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  padding: 0 1px 5px 1px;
  margin: 0 -1px 0 -1px;
  border-bottom: 1px solid rgba(120, 80, 180, .2);
}

.dp-head + #detail-text {
  margin-top: -2px;
}

.dp-category-dot {
  flex-shrink: 0;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-top: 2px;
  background: #8866ff;
  box-shadow: 0 0 12px rgba(136, 102, 255, .55);
}

#dp-category-label {
  flex: 1;
  min-width: 0;
  font-size: 12px;
  font-weight: 600;
  color: rgba(210, 198, 252, .95);
  line-height: 1.4;
  letter-spacing: -0.01em;
  word-break: keep-all;
}

#detail-text {
  font-size: 12px;
  font-weight: 400;
  color: rgba(188, 178, 228, .82);
  line-height: 1.45;
  margin: 0;
  padding: 0 1px;
  word-break: keep-all;
}

#dp-stage-info {
  font-size: 10px;
  font-weight: 500;
  border-radius: 8px;
  padding: 5px 8px;
  margin: 0;
  background: rgba(120, 60, 220, .14);
  color: rgba(205, 190, 240, .88);
  border-left: 2px solid rgba(150, 80, 255, .42);
  line-height: 1.4;
  word-break: keep-all;
}

.ai-msg {
  position: relative;
  font-size: 12px;
  font-weight: 400;
  font-style: italic;
  letter-spacing: 0.02em;
  color: rgba(242, 234, 255, .92);
  padding: 10px 2px 12px 15px;
  margin: 6px 0 8px;
  line-height: 1.65;
  border: none;
  border-radius: 0;
  background: linear-gradient(
    105deg,
    rgba(255, 236, 210, 0.09) 0%,
    rgba(255, 244, 228, 0.04) 32%,
    transparent 58%
  );
  box-shadow: none;
  text-shadow: 0 0 20px rgba(255, 215, 185, .14);
  word-break: keep-all;
}

.ai-msg::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 2px;
  height: 78%;
  min-height: 2.6em;
  border-radius: 2px;
  background: linear-gradient(
    180deg,
    transparent 0%,
    rgba(255, 252, 240, .95) 18%,
    rgba(255, 228, 195, .75) 48%,
    rgba(255, 210, 175, .42) 82%,
    transparent 100%
  );
  box-shadow:
    0 0 12px 2px rgba(255, 220, 185, .38),
    8px 0 22px -6px rgba(255, 200, 160, .22);
  pointer-events: none;
}

#ai-message.hidden {
  display: none;
  margin: 0;
  padding: 0;
}

#ai-message:not(.hidden) {
  cursor: pointer;
  pointer-events: auto;
  transition: background .25s ease, text-shadow .25s ease;
}
#ai-message:not(.hidden):active {
  background: linear-gradient(
    105deg,
    rgba(255, 236, 210, 0.16) 0%,
    rgba(255, 244, 228, 0.08) 38%,
    transparent 62%
  );
}

.warm-ray-overlay {
  position: fixed;
  inset: 0;
  z-index: 25;
  pointer-events: none;
  overflow: hidden;
}
.warm-ray-slab {
  position: absolute;
  inset: -10%;
  opacity: 0;
  mix-blend-mode: screen;
  will-change: opacity, filter, transform;
}
.warm-ray-overlay.playing .warm-ray-slab {
  animation: warm-ray-fade var(--wro-dur, 2s) ease-out var(--wro-delay, 0s) both;
}
@keyframes warm-ray-fade {
  0% {
    opacity: 0;
    filter: blur(24px) saturate(1.06);
    transform: scale(1.05) rotate(var(--wro-spin, 0deg));
  }
  24% {
    opacity: 1;
    filter: blur(7px) saturate(1.18);
    transform: scale(1) rotate(0deg);
  }
  50% {
    opacity: 0.9;
    filter: blur(2px) saturate(1.22);
  }
  100% {
    opacity: 0;
    filter: blur(32px) saturate(1);
    transform: scale(1.1) rotate(var(--wro-spin, 0deg));
  }
}

.btn-dp-close {
  width: 100%;
  margin-top: 0;
  padding: 7px 10px;
  background: transparent;
  border: 1px solid rgba(255, 255, 255, .12);
  border-radius: 9px;
  color: rgba(175, 160, 210, .78);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 11px;
  cursor: pointer;
  transition: background .2s, color .2s;
}
.btn-dp-close:hover {
  background: rgba(255, 255, 255, .07);
  color: rgba(210, 195, 245, .95);
}

.btn-dp-release {
  display: none;
  width: 100%;
  margin-top: 2px;
  margin-bottom: 2px;
  padding: 9px 10px;
  background: linear-gradient(135deg, #9944ff, #6622cc);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s, opacity .2s;
  box-shadow: 0 3px 16px rgba(120, 50, 255, .32);
}
.btn-dp-release:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 5px 22px rgba(140, 60, 255, .45);
}
.btn-dp-release:disabled {
  opacity: 0.42;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
  filter: grayscale(0.25);
}
.btn-dp-release.is-visible { display: block; }

.btn-dp-add-child {
  display: none;
  width: 100%;
  margin-top: 6px;
  padding: 8px 10px;
  background: rgba(255, 255, 255, .06);
  border: 1px solid rgba(160, 140, 220, .38);
  border-radius: 10px;
  color: rgba(200, 185, 245, .95);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s, border-color .2s, color .2s;
}
.btn-dp-add-child:hover {
  background: rgba(255, 255, 255, .1);
  border-color: rgba(180, 160, 255, .5);
  color: #fff;
}
.btn-dp-add-child.is-visible { display: block; }

/* Petting hint */
#pet-hint {
  position: fixed; bottom: 132px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,10,.85); border: 1px solid rgba(120,80,255,.35);
  border-radius: 30px; padding: 9px 22px;
  font-size: 12px; color: rgba(200,180,255,.88); font-weight: 500;
  pointer-events: none; z-index: 50;
  opacity: 0; transition: opacity .4s;
  max-width: 88vw; white-space: normal; text-align: center;
}
#pet-hint.show { opacity: 1; }

/* FAB + 줌(줌일 때만 위에 작게) */
#fab-stack {
  position: absolute;
  left: 0; right: 0;
  bottom: calc(30px + env(safe-area-inset-bottom, 0px));
  z-index: 26;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  pointer-events: none;
}
#fab-stack > * { pointer-events: auto; }

#add-fab {
  position: static;
  margin: 0;
  padding: 12px 28px;
  background: rgba(0,0,12,.82); border: 1px solid rgba(120,70,255,.45);
  border-radius: 30px; color: rgba(180,150,255,.9);
  font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; backdrop-filter: blur(14px);
  box-shadow: 0 4px 26px rgba(80,0,200,.28); transition: all .2s;
}
#add-fab:hover { background: rgba(80,40,160,.3); transform: translateY(-2px); }

/* ==================== TOAST ==================== */
#toast {
  position: fixed; bottom: 88px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: rgba(0,0,12,.92); border: 1px solid rgba(120,80,255,.35);
  border-radius: 30px; padding: 11px 24px;
  font-size: 14px; font-weight: 600; color: #fff;
  backdrop-filter: blur(14px); box-shadow: 0 4px 28px rgba(80,0,200,.28);
  z-index: 200; opacity: 0; transition: all .3s;
  pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ==================== RELEASE POPUP ==================== */
#release-overlay {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 300; background: rgba(0,0,14,.88); backdrop-filter: blur(8px);
  opacity: 0; visibility: hidden; transition: all .4s;
}
#release-overlay.show { opacity: 1; visibility: visible; }
.release-card {
  text-align: center; padding: 48px 40px;
  background: rgba(10,5,28,.95);
  border: 1px solid rgba(160,100,255,.35);
  border-radius: 28px; max-width: 380px; width: 90%;
  box-shadow: 0 0 90px rgba(120,40,255,.25);
}
.release-emoji { font-size: 52px; display: block; margin-bottom: 14px; }
.release-category-name {
  font-size: 20px; font-weight: 700;
  color: #e0d0ff; margin-bottom: 6px;
}
.release-text {
  font-size: 14px; color: rgba(190,170,230,.75);
  line-height: 1.7; margin-bottom: 26px;
}
.btn-release-confirm {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg,#9944ff,#6622cc);
  border: none; border-radius: 12px; color: #fff;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all .2s;
  box-shadow: 0 4px 22px rgba(120,50,255,.35);
  margin-bottom: 10px;
}
.btn-release-confirm:hover { transform: translateY(-1px); box-shadow: 0 6px 30px rgba(140,60,255,.5); }
.btn-release-cancel {
  width: 100%; padding: 10px;
  background: transparent; border: 1px solid rgba(120,80,200,.25);
  border-radius: 12px; color: rgba(170,150,210,.6);
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
  cursor: pointer; transition: all .2s;
}
.btn-release-cancel:hover { background: rgba(80,40,140,.2); }

/* ==================== GOAL OVERLAY ==================== */
#goal-overlay {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 350; background: rgba(0,0,14,.85); backdrop-filter: blur(8px);
  opacity: 0; visibility: hidden; transition: all .4s;
}
#goal-overlay.show { opacity: 1; visibility: visible; }

/* ==================== AUTH BUTTON ==================== */
#auth-btn {

function playWarmRayBurst(){
  const root=document.getElementById('warm-ray-overlay');
  if(!root) return;
  root.classList.remove('playing');
  void root.offsetWidth;
  const r=Math.random;
  const edge=Math.floor(r()*4);
  let bx, by;
  if(edge===0){ bx=6+r()*88; by=-8-r()*20; }
  else if(edge===1){ bx=6+r()*88; by=102+r()*22; }
  else if(edge===2){ bx=-8-r()*18; by=6+r()*88; }
  else { bx=100+r()*18; by=6+r()*88; }
  const slabs=root.querySelectorAll('.warm-ray-slab');
  let maxEnd=0;
  slabs.forEach((slab,i)=>{
    const hx=bx+(r()*24-12);
    const hy=by+(r()*24-12);
    const w=62+r()*58;
    const h=48+r()*48;
    const a0=0.38+r()*0.32;
    const a1=0.12+r()*0.14;
    let hue=26+Math.floor(r()*40);
    if(i===1&&r()>0.48) hue=262+Math.floor(r()*28);
    else if(i===2&&r()>0.62) hue=188+Math.floor(r()*24);
    slab.style.backgroundImage=
      `radial-gradient(ellipse ${w}% ${h}% at ${hx}% ${hy}%, hsla(${hue},${86+i*2}%,${78-i*3}%,${a0}) 0%, hsla(${hue},72%,56%,${a1}) 42%, transparent 72%)`;
    const dur=1.25+r()*1.45;
    const delay=i*(0.04+r()*0.09);
    slab.style.setProperty('--wro-dur', dur.toFixed(3)+'s');
    slab.style.setProperty('--wro-delay', delay.toFixed(3)+'s');
    slab.style.setProperty('--wro-spin', ((r()*2.8-1.4)*(i+1)).toFixed(2)+'deg');
    maxEnd=Math.max(maxEnd, dur+delay);
  });
  root.classList.add('playing');
  clearTimeout(root._warmRayT);
  root._warmRayT=setTimeout(()=>{ root.classList.remove('playing'); }, maxEnd*1000+380);
}

/* 캔버스 CSS 크기(clientWidth/Height)와 카메라·렌더 버퍼를 항상 일치 — 모바일 주소창/inner* 불일치로 라벨이 한쪽에 몰리는 현상 방지 */
let _syncW = 0, _syncH = 0;
function syncCanvasAndCamera(){
  const w = Math.max(8, canvas.clientWidth | 0);
  const h = Math.max(8, canvas.clientHeight | 0);
  if(w === _syncW && h === _syncH) return;
  _syncW = w;
  _syncH = h;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h, false);
}
canvas.style.width = '100%';
canvas.style.height = '100%';

/* ── RICH SPACE BACKGROUND ─────────────────────────────────────
   Layer 1 : 5 000 tiny background stars  (uniform sphere)
   Layer 2 :   900 medium brighter stars  (varied colour temp)
   Layer 3 :   120 large sparkle stars    (blue/white/yellow)
   Layer 4 : 5 500 milky-way band stars   (concentrated plane)
   Layer 5 :   nebula glow clouds         (huge soft points)
   ─────────────────────────────────────────────────────────── */
(function(){
  /* helper: random point on/in sphere */
  function rSph(R){ const t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1),r=R*(.5+Math.random()*.5); return[r*Math.sin(p)*Math.cos(t),r*Math.sin(p)*Math.sin(t),r*Math.cos(p)]; }
  function addPoints(posArr,colArr,size,opacity,name){
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.BufferAttribute(posArr,3));
    if(colArr) g.setAttribute('color',new THREE.BufferAttribute(colArr,3));
    const mat=new THREE.PointsMaterial({
      size, color:0xffffff,
      transparent:true, opacity,
      vertexColors:!!colArr,
      depthWrite:false,                    // ← prevents black-box occlusion
      blending:THREE.AdditiveBlending      // ← stars add light, look glowing
    });
    const pts=new THREE.Points(g,mat); pts.name=name; scene.add(pts);
  }

  /* Layer 1 — distant haze stars */
  const N1=5000, p1=new Float32Array(N1*3), c1=new Float32Array(N1*3);
  for(let i=0;i<N1;i++){
    const[x,y,z]=rSph(550); p1[i*3]=x;p1[i*3+1]=y;p1[i*3+2]=z;
    const t=Math.random(); c1[i*3]=.55+t*.45; c1[i*3+1]=.55+t*.30; c1[i*3+2]=.65+t*.35;
  }
  addPoints(p1,c1,.13,.80,'stars1');

  /* Layer 2 — medium colour-temperature stars */
  const N2=900, p2=new Float32Array(N2*3), c2=new Float32Array(N2*3);
  for(let i=0;i<N2;i++){
    const[x,y,z]=rSph(480); p2[i*3]=x;p2[i*3+1]=y;p2[i*3+2]=z;
    const r=Math.random();
    if(r<.25){      c2[i*3]=.6; c2[i*3+1]=.7; c2[i*3+2]=1;  }   // blue-white
    else if(r<.55){ c2[i*3]=1;  c2[i*3+1]=1;  c2[i*3+2]=1;  }   // pure white
    else if(r<.78){ c2[i*3]=1;  c2[i*3+1]=.92;c2[i*3+2]=.7; }   // warm yellow
    else{           c2[i*3]=1;  c2[i*3+1]=.75;c2[i*3+2]=.55;}   // orange
  }
  addPoints(p2,c2,.38,.72,'stars2');

  /* Layer 3 — bright sparkle stars */
  const N3=120, p3=new Float32Array(N3*3), c3=new Float32Array(N3*3);
  for(let i=0;i<N3;i++){
    const[x,y,z]=rSph(420); p3[i*3]=x;p3[i*3+1]=y;p3[i*3+2]=z;
    const r=Math.random();
    if(r<.4){ c3[i*3]=.75;c3[i*3+1]=.88;c3[i*3+2]=1; }
    else{     c3[i*3]=1;  c3[i*3+1]=.97;c3[i*3+2]=.85; }
  }
  addPoints(p3,c3,.78,.90,'stars3');

  /* Layer 4 — Milky Way band
     Stars concentrated along a great-circle plane (galactic equator).
     Galactic pole tilted ~58° from world-Y, rotated ~35° around Y.  */
  const NMW=5500, pmw=new Float32Array(NMW*3), cmw=new Float32Array(NMW*3);
  const tiltX=1.01, tiltY=0.61; // rotation angles (rad)
  const cX=Math.cos(tiltX),sX=Math.sin(tiltX),cY=Math.cos(tiltY),sY=Math.sin(tiltY);
  for(let i=0;i<NMW;i++){
    const lon=Math.random()*Math.PI*2;
    // Gaussian-ish latitude: narrow band (±0.22 rad ≈ ±13°)
    const lat=(Math.random()+Math.random()+Math.random()-1.5)*.22;
    const r=120+Math.random()*320;
    // Point in galactic frame
    let gx=r*Math.cos(lat)*Math.cos(lon);
    let gy=r*Math.cos(lat)*Math.sin(lon);
    let gz=r*Math.sin(lat);
    // Rotate around X by tiltX
    const gy2=gy*cX-gz*sX, gz2=gy*sX+gz*cX;
    // Rotate around Y by tiltY
    pmw[i*3  ]=gx*cY+gz2*sY;
    pmw[i*3+1]=gy2;
    pmw[i*3+2]=-gx*sY+gz2*cY;
    // Colour: blend of warm cream and cool blue-white
    const t2=Math.random();
    const warm=Math.random()>.55?1:0; // ~45% warm stars
    if(warm){ cmw[i*3]=.88+t2*.12;cmw[i*3+1]=.82+t2*.10;cmw[i*3+2]=.68+t2*.15; }
    else{     cmw[i*3]=.72+t2*.28;cmw[i*3+1]=.74+t2*.20;cmw[i*3+2]=.90+t2*.10; }
  }
  addPoints(pmw,cmw,.09,.62,'milkyway');

  /* Layer 5 — soft nebula glow clouds (3 clusters) */
  const nebDefs=[
    {N:500,R:90,col:0x3311aa,size:4.5,op:.055},  // deep violet
    {N:380,R:70,col:0x7722cc,size:5.5,op:.042},  // purple
    {N:280,R:55,col:0x113366,size:6,  op:.038},  // dark blue
  ];
  nebDefs.forEach(({N,R,col,size,op})=>{
    const pp=new Float32Array(N*3);
    for(let i=0;i<N;i++){
      // Flatten along Y so they form a haze disk, not a sphere
      const[x,y,z]=rSph(R); pp[i*3]=x; pp[i*3+1]=y*.3; pp[i*3+2]=z;
    }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.BufferAttribute(pp,3));
    scene.add(new THREE.Points(g,new THREE.PointsMaterial({size,color:col,transparent:true,opacity:op,depthWrite:false,blending:THREE.AdditiveBlending})));
  });
})();

function makeMesh(isCategory, cIdx){
  const p = pal(cIdx);
  const r = isCategory ? (1.0 + Math.random()*.35) : (0.40 + Math.random()*.18);
  const seg = isCategory ? 28 : 18;
  const mat = new THREE.MeshPhongMaterial({
    color: p.hex,
    emissive: new THREE.Color(p.r/480, p.g/480, p.b/480),
    emissiveIntensity: 1,
    shininess: isCategory ? 90 : 50,
    transparent: true,
    opacity: isCategory ? .92 : .80,
  });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(r, seg, seg), mat);
  const glowMat = new THREE.MeshBasicMaterial({
    color: p.glow, transparent:true,
    opacity: isCategory ? .10 : .06,
    side: THREE.BackSide, depthWrite: false
  });
  const glow = new THREE.Mesh(new THREE.SphereGeometry(r*(isCategory?1.7:2.0), 14, 14), glowMat);
  glow.raycast = ()=>{};
  mesh.add(glow);
  return { mesh, r };
}

const CHILD_ORBIT_GOLD = Math.PI * (3 - Math.sqrt(5));

function countActiveMarbles(){
  return nodes.filter(n=>!n.userData.purified).length;
}

function marbleLayoutScale(){
  const n = Math.max(1, countActiveMarbles());
  const ref = 11;
  const raw = Math.sqrt(n / ref);
  return Math.min(2.55, Math.max(0.93, raw));
}

function childOrbitOffset(siblingIndex){
  const i = Math.max(0, siblingIndex | 0);
  const narrow = typeof innerWidth === 'number' && innerWidth <= 560;
  const spread = narrow ? 1.2 : 1;
  const d = marbleLayoutScale();
  const baseR = 3.95 * spread * d;
  const stepR = 1.34 * spread * d;
  const r = baseR + Math.sqrt(i + 1) * stepR;
  const ang = i * CHILD_ORBIT_GOLD;
  const y = Math.sin(i * 1.73) * (2.35 * spread * d);
  return new THREE.Vector3(Math.cos(ang) * r, y, Math.sin(ang) * r);
}

function spawnPos(isCategory, parentMesh, siblingIndex){
  if(parentMesh){
    const pp = parentMesh.position;
    const off = childOrbitOffset(siblingIndex == null ? 0 : siblingIndex);
    return new THREE.Vector3(pp.x + off.x, pp.y + off.y, pp.z + off.z);
  }
  const narrow = typeof innerWidth === 'number' && innerWidth <= 560;
  const spread = narrow ? 1.22 : 1;
  const d = marbleLayoutScale();
  const ga = Math.PI*(3-Math.sqrt(5));
  const i = nodes.filter(n=>n.userData.isCategory).length+1;
  const r = (9.6 + Math.sqrt(i) * 6.5) * spread * d;
  const th = i * ga;
  const yBand = Math.sin(i * 2.513) * (12 * spread * d);
  const yJ = (Math.random() - 0.5) * 5.4 * Math.min(1.32, d);
  return new THREE.Vector3(Math.cos(th) * r, yBand + yJ, Math.sin(th) * r);
}

function reflowRootCategorySpiral(t){
  if(typeof clock==='undefined'||!clock) return;
  const tt = t !== undefined ? t : clock.getElapsedTime();
  const narrow = typeof innerWidth === 'number' && innerWidth <= 560;
  const spread = narrow ? 1.22 : 1;
  const roots = nodes.filter(n=>
    n.userData.isCategory && !n.userData.purified && n.userData.parentId == null
  ).sort((a,b)=>a.userData.id-b.userData.id);
  if(!roots.length) return;
  const d = marbleLayoutScale();
  const ga = Math.PI*(3-Math.sqrt(5));
  roots.forEach((node, idx)=>{
    const i = idx + 1;
    const r = (9.6 + Math.sqrt(i) * 6.5) * spread * d;
    const th = i * ga;
    const yBand = Math.sin(i * 2.513) * (12 * spread * d);
    const childCount = nodes.filter(n=>n.userData.parentId===node.userData.id&&!n.userData.purified).length;
    const gravityY = -Math.min(11, childCount*0.42);
    const bob = Math.sin(tt*node.userData.floatSpd+node.userData.floatOff)*0.45;
    node.position.x = Math.cos(th)*r;
    node.position.z = Math.sin(th)*r;
    node.userData.originY = yBand - gravityY - bob;
  });
}

function reflowChildOrbitsAroundParents(elapsed){
  if(typeof clock==='undefined'||!clock) return;
  const t = elapsed !== undefined ? elapsed : clock.getElapsedTime();
  nodes.filter(n=>n.userData.isCategory&&!n.userData.purified).forEach(cat=>{
    const kids=nodes.filter(n=>n.userData.parentId===cat.userData.id&&!n.userData.purified&&!n.userData.isCategory)
      .sort((a,b)=>a.userData.id-b.userData.id);
    kids.forEach((kid,i)=>{
      const off=childOrbitOffset(i);
      kid.position.x=cat.position.x+off.x;
      kid.position.z=cat.position.z+off.z;
      const bob=Math.sin(t*kid.userData.floatSpd+kid.userData.floatOff)*0.45;
      kid.position.y=cat.position.y+off.y;
      kid.userData.originY=kid.position.y-bob;
    });
  });
}

function addNode(text, isCategory, cIdx, parentMesh, pos){
  const ci = (cIdx!==undefined&&cIdx>=0) ? cIdx
           : isCategory ? (colorIdx++%PALETTE.length)
           : (parentMesh ? parentMesh.userData.cIdx : colorIdx%PALETTE.length);
  const {mesh} = makeMesh(isCategory, ci);
  let p = pos;
  if(!p && parentMesh){
    const sib=nodes.filter(n=>n.userData.parentId===parentMesh.userData.id&&!n.userData.purified).length;
    p = spawnPos(isCategory, parentMesh, sib);
  } else if(!p){
    p = spawnPos(isCategory, null);
  }
  mesh.position.copy(p);

  const id = nodeIdSeq++;
  mesh.userData = {
    text, isCategory, cIdx: ci,
    parentId: parentMesh ? parentMesh.userData.id : null,
    id,
    stages: 1,       // purification stages (can increment if thought recurring)
    strokeCount: 0,  // total strokes applied
    floatOff: Math.random()*Math.PI*2,
    floatSpd: isCategory ? .18+Math.random()*.12 : .28+Math.random()*.22,
    originY: p.y,
    rotSpY: (Math.random()-.5)*(isCategory?.0038:.0075),
    purified: false,
    purifyingAnim: false,
    readyForRelease: false, // category whose children are all purified
  };

  mesh.userData.label = createLabel(text, isCategory, ci);
  if(!isCategory){
    mesh.userData.label.addEventListener('click', e=>{
      e.preventDefault();
      e.stopPropagation();
      if(mesh.userData.purified||mesh.userData.purifyingAnim) return;
      selectNode(mesh);
    });
  }
  scene.add(mesh);
  nodes.push(mesh);

  if(parentMesh) addConnection(mesh, parentMesh, true);
  else if(nodes.length>1){
    const others = nodes.slice(0,-1).sort(()=>Math.random()-.5);
    const n = Math.min(nodes.length<=3?1:2, others.length);
    for(let i=0;i<n;i++) addConnection(mesh, others[i], false);
  }
  return mesh;
}

const ROPE_SEG = 20;
function addConnection(a, b, isParent){
  const positions = new Float32Array(ROPE_SEG * 3);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const p = pal(a.userData.cIdx);
  const color  = isParent ? p.glow : 0x334455;
  const opac   = isParent ? .42    : .2;
  const line = new THREE.Line(geo, new THREE.LineBasicMaterial({color,transparent:true,opacity:opac}));
  line.userData = {
    nodeA:a, nodeB:b, isParent, ropeSeg:ROPE_SEG,
    ropePh:{
      e:Math.random()*Math.PI*2, ax:Math.random()*Math.PI*2, st:Math.random()*Math.PI*2,
      sg:Math.random()*Math.PI*2, r1:Math.random()*Math.PI*2, r2:Math.random()*Math.PI*2, r3:Math.random()*Math.PI*2,
    },
    ropeFq:{
      st:1.55+Math.random()*.75, sg:1.35+Math.random()*.65, rp:2.1+Math.random()*1.1,
    },
  };
  scene.add(line);
  connections.push(line);
}

function updateConnections(elapsed){
  const t = elapsed !== undefined ? elapsed : clock.getElapsedTime();
  for(let i=connections.length-1;i>=0;i--){
    const c=connections[i], na=c.userData.nodeA, nb=c.userData.nodeB;
    if(na.userData.purified||nb.userData.purified){ scene.remove(c); connections.splice(i,1); continue; }
    const ax=na.position.x, ay=na.position.y, az=na.position.z;
    const bx=nb.position.x, by=nb.position.y, bz=nb.position.z;
    let dx=bx-ax, dy=by-ay, dz=bz-az;
    const L = Math.hypot(dx,dy,dz);
    const arr=c.geometry.attributes.position.array;
    const seg=c.userData.ropeSeg||2;
    if(L<1e-5){
      for(let j=0;j<seg;j++){ arr[j*3]=ax; arr[j*3+1]=ay; arr[j*3+2]=az; }
      c.geometry.attributes.position.needsUpdate=true;
      continue;
    }
    const inv=1/L;
    dx*=inv; dy*=inv; dz*=inv;
    let px=-dz, py=0, pz=dx;
    let pl=Math.hypot(px,py,pz);
    if(pl<1e-6){ px=0; py=1; pz=0; pl=1; }
    px/=pl; py/=pl; pz/=pl;
    let qx=dy*pz-dz*py, qy=dz*px-dx*pz, qz=dx*py-dy*px;
    let ql=Math.hypot(qx,qy,qz); qx/=ql; qy/=ql; qz/=ql;
    let gx=dx*dy, gy=-1+dy*dy, gz=dz*dy;
    let gl=Math.hypot(gx,gy,gz);
    if(gl<1e-5){ gx=px; gy=py; gz=pz; gl=1; }
    gx/=gl; gy/=gl; gz/=gl;
    const ph=c.userData.ropePh||{};
    const fq=c.userData.ropeFq||{st:1.8,sg:1.6,rp:2.6};
    const sm=seg-1;
    for(let j=0;j<seg;j++){
      const u=sm>0?j/sm:0;
      const k=Math.sin(Math.PI*u);
      const k2=k*k;
      const axial=L*0.048*Math.sin(t*2.05+ph.e)*k*Math.sin(u*11.3+ph.ax);
      const breathe=L*0.024*Math.sin(t*fq.st+ph.st)*Math.sin(2*Math.PI*u*2.1+ph.ax);
      let sx=ax+dx*L*u+dx*axial+dx*breathe*0.55;
      let sy=ay+dy*L*u+dy*axial+dy*breathe*0.55;
      let sz=az+dz*L*u+dz*axial+dz*breathe*0.55;
      const sag=L*k2*(0.15+0.11*Math.sin(t*fq.sg+ph.sg));
      sx+=gx*sag; sy+=gy*sag; sz+=gz*sag;
      const w=L*k*(0.088*Math.sin(t*fq.rp+ph.r1+u*6.2)+0.058*Math.sin(t*fq.rp*1.41+ph.r2+u*9.5));
      const w2=L*k*0.048*Math.sin(t*1.72+ph.r3+u*4.35);
      sx+=px*w+qx*w2; sy+=py*w+qy*w2; sz+=pz*w+qz*w2;
      arr[j*3]=sx; arr[j*3+1]=sy; arr[j*3+2]=sz;
    }
    c.geometry.attributes.position.needsUpdate=true;
  }
}

const labelsEl = document.getElementById('labels-container');
const _lblWorld = new THREE.Vector3();

function createLabel(text, isCategory, ci){
  const p = pal(ci);
  const div = document.createElement('div');
  div.className = 'node-label '+(isCategory?'category':'thought');
  const limit = isCategory ? 20 : 30;
  div.textContent = text.length>limit ? text.slice(0,limit-1)+'…' : text;
  if(isCategory){
    // 카테고리: 팔레트 색상 그대로, 선명하고 진하게
    div.style.color      = `rgb(${Math.min(p.r+90,255)},${Math.min(p.g+90,255)},${Math.min(p.b+90,255)})`;
    div.style.background = `rgba(${p.r},${p.g},${p.b},.52)`;
    div.style.border     = `1px solid rgba(${p.r},${p.g},${p.b},.55)`;
  } else {
    // 세부 관념: 같은 색상 계열이지만 흰색과 혼합해 파스텔·연한 톤으로 분리
    const tr = Math.round(p.r*0.45 + 130);
    const tg = Math.round(p.g*0.45 + 130);
    const tb = Math.round(p.b*0.45 + 140);
    div.style.color      = `rgb(${Math.min(tr+40,255)},${Math.min(tg+40,255)},${Math.min(tb+40,255)})`;
    div.style.background = `rgba(${tr},${tg},${tb},.28)`;
    div.style.border     = `1px solid rgba(${tr},${tg},${tb},.38)`;
  }
  labelsEl.appendChild(div);
  return div;
}

function createStrokeBadge(node){
  const div = document.createElement('div');
  div.className = 'stroke-badge';
  labelsEl.appendChild(div);
  node.userData.strokeBadge = div;
}
function removeStrokeBadge(node){
  if(node.userData.strokeBadge){ labelsEl.removeChild(node.userData.strokeBadge); node.userData.strokeBadge=null; }
}

function updateLabels(){
  const rect = canvas.getBoundingClientRect();
  const rw = rect.width;
  const rh = rect.height;
  if(rw < 4 || rh < 4) return;
  nodes.forEach(node => {
    const lbl = node.userData.label;
    const badge = node.userData.strokeBadge;
    if(lbl && node.userData.purified){ lbl.style.display='none'; }
    if(badge && (node.userData.purified||pettingNode!==node)){ badge.style.display='none'; }

    const wantLbl = lbl && !node.userData.purified;
    const wantBadge = badge && !node.userData.purified && pettingNode===node;
    if(!wantLbl && !wantBadge) return;

    node.updateMatrixWorld(true);
    node.getWorldPosition(_lblWorld);
    _lblWorld.project(camera);
    const behind = _lblWorld.z > 1;
    const sx = rect.left + (_lblWorld.x * .5 + .5) * rw;
    const sy = rect.top  + (-_lblWorld.y * .5 + .5) * rh;

    if(wantLbl){
      if(behind){ lbl.style.display='none'; }
      else {
        lbl.style.display='block';
        lbl.style.left = sx + 'px';
        lbl.style.top  = sy + 'px';
      }
    }
    if(wantBadge){
      if(behind){ badge.style.display='none'; }
      else {
        badge.style.display='block';
        badge.style.left = sx + 'px';
        badge.style.top  = sy + 'px';
        const needed = node.userData.stages * 10;
        badge.textContent = `✋ ${node.userData.strokeCount}/${needed}`;
      }
    }
  });
}

let camTheta=0, camPhi=1.1, camRadius=28;
let isDragging=false, hasDragged=false, prevMouse={x:0,y:0};
let autoRotate=true, autoRotTimer=null;

function updateCamera(){
  camera.position.set(
    camRadius*Math.sin(camPhi)*Math.cos(camTheta),
    camRadius*Math.cos(camPhi),
    camRadius*Math.sin(camPhi)*Math.sin(camTheta)
  );
  camera.lookAt(0,0,0);
}

/* ================================================================
   RAYCASTING
   ================================================================ */
const raycaster = new THREE.Raycaster();
const mouseV = new THREE.Vector2();

function getNodeAt(cx, cy){
  const rect=canvas.getBoundingClientRect();
  const rw = rect.width;
  const rh = rect.height;
  if(rw < 4 || rh < 4) return null;
  mouseV.x=((cx-rect.left)/rw)*2-1;
  mouseV.y=-((cy-rect.top)/rh)*2+1;
  raycaster.setFromCamera(mouseV, camera);
  const active=nodes.filter(n=>!n.userData.purified&&!n.userData.purifyingAnim);
  const hits=raycaster.intersectObjects(active, false);
  if(hits.length>0) return hits[0].object;

  const narrow = innerWidth <= 560;
  let closest=null, best=Infinity;
  active.forEach(node=>{
    node.updateMatrixWorld(true);
    node.getWorldPosition(_lblWorld);
    _lblWorld.project(camera);
    if(_lblWorld.z>1) return;
    const sx=rect.left+(_lblWorld.x*.5+.5)*rw;
    const sy=rect.top +(-_lblWorld.y*.5+.5)*rh;
    const d=Math.hypot(cx-sx, cy-sy);
    const lim=narrow
      ? (node.userData.isCategory ? 56 : 84)
      : (node.userData.isCategory ? 48 : 58);
    if(d<=lim && d<best){ best=d; closest=node; }
  });
  return closest;
}

let selectedNode = null;
let hoveredNode  = null;

function categoryHasChildren(catNode){
  return nodes.some(n=>n.userData.parentId===catNode.userData.id);
}

function categoryCanRelease(catNode){
  if(!catNode||!catNode.userData.isCategory) return false;
  return !!catNode.userData.readyForRelease || !categoryHasChildren(catNode);
}

function formatCategoryPurifiedCount(catNode){
  const total=nodes.filter(n=>n.userData.parentId===catNode.userData.id);
  const active=nodes.filter(n=>n.userData.parentId===catNode.userData.id&&!n.userData.purified);
  const purified=total.length-active.length;
  return `${purified}/${total.length} ✋`;
}

function formatThoughtPettingLine(node){
  const d=node.userData.strokeCount%10;
  return `${d}/10 ✋`;
}

function setThoughtLabelSelected(node, on){
  const el=node&&node.userData&&node.userData.label;
  if(!el||node.userData.isCategory) return;
  el.classList.toggle('is-selected', !!on);
}

function clearSelectionVisual(node){
  if(!node||node.userData.purified) return;
  const g=node.children[0];
  if(g) g.scale.setScalar(1);
  if(node.userData.isCategory){
    node.material.emissiveIntensity=1;
  } else {
    const pr=(node.userData.strokeCount%(node.userData.stages*10))/(node.userData.stages*10);
    node.material.emissiveIntensity=1+pr*2.5;
    if(g) g.material.opacity=.06+pr*.18;
  }
}

function applyThoughtSelectedVisual(node){
  if(!node||node.userData.isCategory) return;
  const g=node.children[0];
  const pr=(node.userData.strokeCount%(node.userData.stages*10))/(node.userData.stages*10);
  node.material.emissiveIntensity=Math.min(3.2, 1.9+pr*1.15);
  if(g){
    g.scale.setScalar(1.45);
    g.material.opacity=Math.min(0.28, 0.06+pr*0.18+0.12);
  }
}

function selectNode(node){
  if(selectedNode&&selectedNode!==node){
    clearSelectionVisual(selectedNode);
    setThoughtLabelSelected(selectedNode, false);
    selectedNode.scale.setScalar(1);
  }
  selectedNode=node;
  setThoughtLabelSelected(node, true);
  node.scale.setScalar(1.15);
  if(node.userData.isCategory){
    node.material.emissiveIntensity=2.2;
  } else {
    applyThoughtSelectedVisual(node);
  }

  const relBtn=document.getElementById('dp-release-btn');
  const catLab=document.getElementById('dp-category-label');
  if(node.userData.isCategory){
    catLab.textContent=node.userData.text;
  } else if(node.userData.parentId){
    const par=nodes.find(n=>n.userData.id===node.userData.parentId);
    catLab.textContent=par?par.userData.text:'—';
  } else {
    catLab.textContent='—';
  }

  let dotCIdx=node.userData.cIdx;
  if(!node.userData.isCategory&&node.userData.parentId){
    const parDot=nodes.find(n=>n.userData.id===node.userData.parentId);
    if(parDot) dotCIdx=parDot.userData.cIdx;
  }
  const pd=pal(dotCIdx);
  const dotEl=document.getElementById('dp-category-dot');
  dotEl.style.background=`rgb(${pd.r},${pd.g},${pd.b})`;
  dotEl.style.boxShadow=`0 0 12px rgba(${pd.r},${pd.g},${pd.b},.55)`;

  document.getElementById('detail-text').textContent='"'+node.userData.text+'"';

  const stageEl=document.getElementById('dp-stage-info');
  if(node.userData.isCategory){
    stageEl.textContent=formatCategoryPurifiedCount(node);
  } else {
    stageEl.textContent=formatThoughtPettingLine(node);
  }

  const aiEl=document.getElementById('ai-message');
  if(node.userData.isCategory){
    aiEl.textContent='';
    aiEl.classList.add('hidden');
  } else {
    aiEl.classList.remove('hidden');
    aiEl.textContent=PURIFY_MSGS[Math.floor(Math.random()*PURIFY_MSGS.length)];
  }

  const addChildBtn=document.getElementById('dp-add-child-btn');
  if(node.userData.isCategory){
    addChildBtn.classList.add('is-visible');
    relBtn.classList.add('is-visible');
    const canRelease=categoryCanRelease(node);
    relBtn.disabled=!canRelease;
    relBtn.title=canRelease?'':'세부 관념을 모두 정화하면 보낼 수 있어요';
  } else {
    addChildBtn.classList.remove('is-visible');
    relBtn.classList.remove('is-visible');
    relBtn.disabled=true;
    relBtn.title='';
  }

  document.getElementById('detail-panel').classList.remove('hidden');
}

function deselectNode(){
  if(selectedNode){
    clearSelectionVisual(selectedNode);
    setThoughtLabelSelected(selectedNode, false);
    selectedNode.scale.setScalar(1);
    selectedNode=null;
  }
  document.getElementById('detail-panel').classList.add('hidden');
}

/* ================================================================
   PETTING (STROKE) MECHANIC
   ================================================================ */
let pettingNode  = null;
let pettingDist  = 0;  // total px moved this press
let pettingPixels= 0;  // accumulator toward next stroke
let prevPet      = {x:0,y:0};
let wasPetting   = false; // moved enough to count as pet vs click
const PET_THRESHOLD = 55; // px per stroke
const PET_MIN_DIST  = 12; // min movement to start petting

function startPet(cx, cy){
  pettingDist=0; pettingPixels=0; wasPetting=false;
  prevPet={x:cx,y:cy};
}

function movePet(cx, cy){
  const dx=cx-prevPet.x, dy=cy-prevPet.y;
  const d=Math.sqrt(dx*dx+dy*dy);
  pettingDist+=d; pettingPixels+=d;
  prevPet={x:cx,y:cy};
  if(pettingDist>PET_MIN_DIST) wasPetting=true;

  while(pettingPixels>=PET_THRESHOLD){
    pettingPixels-=PET_THRESHOLD;
    applyStroke(pettingNode);
  }
  // Wobble visual
  if(pettingNode&&!pettingNode.userData.purifyingAnim){
    pettingNode.userData.wobbleMag = Math.min(d*0.012, 0.15);
  }
}

function applyStroke(node){
  if(!node||node.userData.purified||node.userData.purifyingAnim) return;
  if(node.userData.isCategory){ showToast('작은 구슬을 쓰다듬어 주세요'); return; }

  node.userData.strokeCount++;

  // Update detail panel if visible
  if(selectedNode===node){
    document.getElementById('dp-stage-info').textContent=formatThoughtPettingLine(node);
  }

  // Color shift toward white as progress builds
  const progress=(node.userData.strokeCount%(node.userData.stages*10))/(node.userData.stages*10);
  const p=pal(node.userData.cIdx);
  node.material.color.setRGB(
    p.r/255 + progress*(1-p.r/255)*.7,
    p.g/255 + progress*(1-p.g/255)*.7,
    p.b/255 + progress*(1-p.b/255)*.7,
  );
  if(selectedNode===node){
    applyThoughtSelectedVisual(node);
  } else {
    node.material.emissiveIntensity=1+progress*2.5;
    if(node.children[0]) node.children[0].material.opacity=.06+progress*.18;
  }

  const needed=node.userData.stages*10;
  if(node.userData.strokeCount>=needed){
    finishPurification(node);
  }
}

function finishPurification(node){
  // Reset color (for brief moment before animation)
  const p=pal(node.userData.cIdx);
  node.material.color.setHex(p.hex);
  purifyNode(node);
}

/* ================================================================
   PURIFICATION ANIMATION (slow, meditative)
   ================================================================ */
function purifyNode(node){
  if(node.userData.purified||node.userData.purifyingAnim) return;
  node.userData.purifyingAnim=true;
  if(pettingNode===node){ pettingNode=null; removeStrokeBadge(node); }
  if(selectedNode===node) deselectNode();

  const p=pal(node.userData.cIdx);
  const startPos=node.position.clone();

  // Particles
  const PC=80, pPos=new Float32Array(PC*3), pVel=[];
  for(let i=0;i<PC;i++){
    pPos[i*3]=startPos.x; pPos[i*3+1]=startPos.y; pPos[i*3+2]=startPos.z;
    const phi=Math.acos(2*Math.random()-1), th=Math.random()*Math.PI*2;
    const spd=.03+Math.random()*.09;
    pVel.push(Math.sin(phi)*Math.cos(th)*spd, Math.sin(phi)*Math.sin(th)*spd, Math.cos(phi)*spd);
  }
  const pGeo=new THREE.BufferGeometry();
  pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
  const pMat=new THREE.PointsMaterial({
    color:new THREE.Color(Math.min(p.r+90,255)/255,Math.min(p.g+90,255)/255,Math.min(p.b+90,255)/255),
    size:.35, transparent:true, opacity:1, sizeAttenuation:true, depthWrite:false
  });
  const pts=new THREE.Points(pGeo,pMat);
  scene.add(pts);
  const flash=new THREE.PointLight(0xffffff,5,18);
  flash.position.copy(startPos); scene.add(flash);

  let frame=0;
  const PULSE=40, TOTAL=130;
  function step(){
    frame++;
    if(frame<=PULSE){
      node.scale.setScalar(1+.28*Math.sin(frame*.6));
      const w=frame/PULSE;
      node.material.emissive.setRGB(w*.5,w*.35,w*.6);
    } else {
      const lt=(frame-PULSE)/(TOTAL-PULSE);
      node.scale.setScalar(1+lt*2);
      node.material.opacity=1-lt;
      if(node.children[0]) node.children[0].material.opacity=.1*(1-lt);
      const arr=pts.geometry.attributes.position.array;
      for(let i=0;i<PC;i++){ arr[i*3]+=pVel[i*3]; arr[i*3+1]+=pVel[i*3+1]; arr[i*3+2]+=pVel[i*3+2]; }
      pts.geometry.attributes.position.needsUpdate=true;
      pMat.opacity=1-lt; flash.intensity=5*(1-lt*1.3);
    }
    if(frame<TOTAL){ requestAnimationFrame(step); return; }
    scene.remove(pts,flash); pGeo.dispose(); pMat.dispose();
    cleanupNode(node);
    onPurified();
    checkParentRelease(node);
  }
  requestAnimationFrame(step);
}

function releaseUpward(node){
  if(node.userData.purified||node.userData.purifyingAnim) return;
  node.userData.purifyingAnim=true;
  if(selectedNode===node) deselectNode();

  const startY=node.position.y;
  const p=pal(node.userData.cIdx);

  // Trail particles
  const PC=40, pPos=new Float32Array(PC*3), pVel=[];
  for(let i=0;i<PC;i++){
    pPos[i*3]=node.position.x+(Math.random()-.5)*.6;
    pPos[i*3+1]=node.position.y;
    pPos[i*3+2]=node.position.z+(Math.random()-.5)*.6;
    pVel.push((Math.random()-.5)*.04, .12+Math.random()*.12, (Math.random()-.5)*.04);
  }
  const pGeo=new THREE.BufferGeometry();
  pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
  const pMat=new THREE.PointsMaterial({
    color:new THREE.Color(Math.min(p.r+100,255)/255,Math.min(p.g+100,255)/255,Math.min(p.b+100,255)/255),
    size:.5, transparent:true, opacity:.9, sizeAttenuation:true, depthWrite:false
  });
  const trail=new THREE.Points(pGeo,pMat);
  scene.add(trail);

  const riseLight=new THREE.PointLight(new THREE.Color(p.glow),3,20);
  riseLight.position.copy(node.position); scene.add(riseLight);

  let frame=0;
  const TOTAL=200;
  function step(){
    frame++;
    const t=frame/TOTAL;
    const eased=t*t; // ease-in (accelerate upward)
    node.position.y=startY+eased*45;
    node.scale.setScalar(Math.max(0,1-t*.9));
    node.material.opacity=Math.max(0,1-t*1.1);
    if(node.children[0]) node.children[0].material.opacity=.1*(1-t);
    if(node.userData.label) node.userData.label.style.display='none';

    const arr=trail.geometry.attributes.position.array;
    for(let i=0;i<PC;i++){ arr[i*3]+=pVel[i*3]; arr[i*3+1]+=pVel[i*3+1]; arr[i*3+2]+=pVel[i*3+2]; }
    trail.geometry.attributes.position.needsUpdate=true;
    pMat.opacity=Math.max(0,.9-t);
    riseLight.position.y=node.position.y;
    riseLight.intensity=3*(1-t);

    if(frame<TOTAL){ requestAnimationFrame(step); return; }
    scene.remove(trail,riseLight); pGeo.dispose(); pMat.dispose();
    cleanupNode(node);
    showToast('🕊️ 관념이 우주로 돌아갔습니다');
    onPurified();
  }
  requestAnimationFrame(step);
}

function cleanupNode(node){
  purifiedHistory.push({

}

/* ================================================================
   STREAM-OF-CONSCIOUSNESS PARSER
   ================================================================ */
const THOUGHT_CHUNK_SOFT_MAX = 36;

function splitLongBySpaces(s, maxLen){
  if(s.length<=maxLen) return [s];
  const out=[];
  let start=0;
  while(start<s.length){
    let end=Math.min(start+maxLen,s.length);
    if(end<s.length){
      let cut=s.lastIndexOf(' ',end);
      if(cut<start+12){
        cut=s.indexOf(' ',start+14);
        if(cut===-1) cut=end;
      }
      if(cut<=start) cut=end;
      end=cut;
    }
    const piece=s.slice(start,end).trim();
    if(piece) out.push(piece);
    start=end;
    while(start<s.length&&s[start]===' ') start++;
  }
  return out.length?out:[s];
}

function mergeShortThoughtChunks(chunks, minLen){
  const out=[];
  for(const c of chunks){
    const t=c.trim();
    if(!t) continue;
    if(t.length>=minLen){ out.push(t); continue; }
    if(out.length) out[out.length-1]=(out[out.length-1]+' '+t).trim();
    else out.push(t);
  }
  if(out.length>=2&&out[out.length-1].length<minLen){
    out[out.length-2]=(out[out.length-2]+' '+out[out.length-1]).trim();
    out.pop();
  }
  return out;
}

/** 마침표·쉼표 없이 이어진 긴 텍스트를 접속/담화 표지·공백 기준으로 잘라 구슬 단위 후보 생성 */
function splitRunOnThought(text){
  const t=(text||'').trim().replace(/\s+/g,' ');
  if(!t) return [];
  const conn=/\s+(?=(?:그리고|그런데|그래서|하지만|또한|그러나|그러니까|아니면|근데|요즘|오늘|어제|내일|나는|내가|우리는|진짜|사실|결국|그냥|점점|자꾸|계속|매번|가끔|아직|이제|왜냐하면|덕분에|아무래도|솔직히|문득|갑자기|어쨌든|하여튼|그리하여)(?:\s|$))/;
  const first=t.split(conn).map(s=>s.trim()).filter(Boolean);
  const raw=[];
  for(const seg of first){
    if(seg.length<=THOUGHT_CHUNK_SOFT_MAX) raw.push(seg);
    else raw.push(...splitLongBySpaces(seg,THOUGHT_CHUNK_SOFT_MAX));
  }
  return mergeShortThoughtChunks(raw,4);
}

function expandThoughtFragments(thoughts){
  if(!Array.isArray(thoughts)) return [];
  return thoughts.flatMap(x=>typeof x==='string'?splitRunOnThought(x):[]).filter(s=>s.length>=4);
}

function _escRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function _kwScore(s,k){
  if(!k||!s) return 0;
  const re=new RegExp('(?:^|[^\\w가-힣])'+_escRe(k)+'(?:[^\\w가-힣]|$)','u');
  if(re.test(s)) return 2;
  if(s.includes(k)) return 1;
  return 0;
}
function detectTheme(s){
  let best=null, bestScore=0, bestLen=0;
  for(const [theme,keys] of Object.entries(THEME_MAP)){
    const score=keys.reduce((a,k)=>a+_kwScore(s,k),0);
    if(score>bestScore||(score===bestScore&&score>0&&keys.length>bestLen)){
      bestScore=score; best=theme; bestLen=keys.length;
    }
  }
  return {theme:bestScore>0?best:null, score:bestScore};
}

function parseStream(rawText){
  const sentences=rawText
    .split(/[.!?…~｡。、，,\n\r\t]+/)
    .map(s=>s.trim())
    .filter(s=>s.length>=4);

  if(sentences.length===0) return [];
  if(sentences.length===1){
    const s=sentences[0];
    const {theme}=detectTheme(s);
    if(theme) return [{catName:theme, thoughts:[s]}];
    return [{catName:s.length<=12?s:null, thoughts:s.length<=12?[]:[s]}];
  }

  const tagged=sentences.map(text=>{
    const {theme,score}=detectTheme(text);
    return {text,theme,score};
  });

  const counts={};
  tagged.forEach(({theme,score})=>{
    if(!theme) return;
    counts[theme]=(counts[theme]||0)+1;
    if(score>=2) counts[theme+'__s']=(counts[theme+'__s']||0)+1;
  });

  const result=[], used=new Set();
  for(const [theme,cnt] of Object.entries(counts)){
    if(theme.endsWith('__s')) continue;
    const strong=counts[theme+'__s']||0;
    if(cnt>=2||(cnt>=1&&strong>=1)){
      const group=tagged.filter(t=>t.theme===theme);
      group.forEach(t=>used.add(t.text));
      result.push({catName:theme, thoughts:group.map(t=>t.text)});
    }
  }

  const remaining=tagged.filter(t=>!used.has(t.text));
  remaining.forEach(({text,theme,score})=>{
    const eg=theme?result.find(r=>r.catName===theme):null;
    if(eg){ eg.thoughts.push(text); return; }
    if(theme&&score>=2){ result.push({catName:theme,thoughts:[text]}); return; }
    if(!theme){
      const daily=result.find(r=>r.catName==='일상의 생각');
      if(daily) daily.thoughts.push(text);
      else result.push({catName:'일상의 생각',thoughts:[text]});
    } else {
      result.push({catName:theme,thoughts:[text]});
    }
  });

  return result.filter(r=>r.thoughts.length>0||r.catName);
}

async function parseStreamWithAI(rawText){
  showToast('✨ 관념을 분석하고 있어요...');

  async function tryLocalApiProxy(){
    try{
      const res=await fetch('/api/parse',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({text:rawText})
      });
      if(!res.ok) return null;
      const data=await res.json();
      const arr=data.groups;
      if(!Array.isArray(arr)||arr.length===0) return null;
      return arr;
    }catch{ return null; }
  }

  const h=location.hostname;
  const onLocalHttp=(location.protocol==='http:'||location.protocol==='https:')&&(h==='localhost'||h==='127.0.0.1');
  if(onLocalHttp){
    const viaProxy=await tryLocalApiProxy();
    if(viaProxy) return viaProxy;
  }

  const apiKey=localStorage.getItem('openai_api_key');
  if(!apiKey) return null;

  try{
    const res=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({
        model:'gpt-4o-mini',
        temperature:0.3,
        max_tokens:1000,
        messages:[
          {role:'system',content:'당신은 한국어 의식의 흐름 텍스트에서 주요 개념을 구조화하는 도우미입니다.\n'+
            '- 상위 카테고리(부모)와 구체적인 생각들(자식)을 추출하세요.\n'+
            '- 반드시 아래 JSON 형식만 출력하세요. 다른 설명·마크다운·코드펜스는 금지입니다.\n'+
            '{"groups": [{"catName": "카테고리명", "thoughts": ["생각1", "생각2"]}]}\n'+
            '- catName은 한글 3~10자.\n'+
            '- 비슷한 생각은 하나의 카테고리로 묶으세요.\n'+
            '- 카테고리는 최대 6개, 최소 1개.\n'+
            '- thoughts는 해당 카테고리에 속하는 구체적 문장/구절 배열.\n'+
            '- 한 덩어리가 길면(쉼표·마침표 없이 이어진 경우) 의미·호흡 단위로 나눠 배열에 여러 문자열로 넣으세요.'},
          {role:'user',content:rawText}
        ]
      })
    });
    if(!res.ok) return null;
    const data=await res.json();
    const content=data.choices?.[0]?.message?.content?.trim();
    if(!content) return null;
    let jsonStr=content;
    const fence=content.match(/^```(?:json)?\s*([\s\S]*?)```$/m);
    if(fence) jsonStr=fence[1].trim();
    let parsed;
    try{ parsed=JSON.parse(jsonStr); }
    catch{ return null; }
    const arr=parsed.groups;
    if(!Array.isArray(arr)) return null;
    const out=arr
      .filter(g=>g&&typeof g.catName==='string')
      .map(g=>({
        catName:g.catName.trim(),
        thoughts:Array.isArray(g.thoughts)?g.thoughts.filter(t=>typeof t==='string'&&t.trim()).map(t=>t.trim()):[]
      }))
      .filter(g=>g.catName.length>0);
    return out.length?out:null;
  }catch{ return null; }
}

function findMatchingCategory(catName){
  return nodes.find(n=>{
    if(!n.userData.isCategory||n.userData.purified) return false;
    if(n.userData.text===catName) return true;
    const themeKeys=THEME_MAP[catName]||[];
    return themeKeys.some(k=>n.userData.text.includes(k));
  });
}

function findSimilarThought(text){
  const words=text.split(/\s+/).filter(w=>w.length>1);
  return nodes.find(n=>{
    if(n.userData.isCategory||n.userData.purified) return false;
    const nw=n.userData.text.split(/\s+/).filter(w=>w.length>1);
    const overlap=words.filter(w=>nw.some(nword=>nword.includes(w)||w.includes(nword)));
    return overlap.length>=Math.min(2,Math.ceil(words.length*.5));
  });
}

function processGroups(groups){
  let delay=100;
  groups.forEach(({catName,thoughts:rawThoughts})=>{
    const thoughts=expandThoughtFragments(rawThoughts||[]);
    const ci=colorIdx++%PALETTE.length;
    if(thoughts.length===0 && catName){
      setTimeout(()=>{ addNode(catName,false,ci,null); updateEmptyState(); saveData(); }, delay);
      delay+=350;
      return;
    }
    if(catName){
      const catDelay=delay; delay+=380;
      setTimeout(()=>{
        let catNode=findMatchingCategory(catName);
        if(!catNode) catNode=addNode(catName,true,ci,null);
        updateEmptyState();
        thoughts.forEach((thought,i)=>{
          setTimeout(()=>{
            const sim=findSimilarThought(thought);
            if(sim){ sim.userData.stages++; if(selectedNode===sim) selectNode(sim); }
            else addNode(thought,false,catNode.userData.cIdx,catNode);
            updateEmptyState();
            saveData();
          },(i+1)*260);
        });
      },catDelay);
      delay+=thoughts.length*260;
    } else {
      thoughts.forEach(thought=>{
        setTimeout(()=>{
          const sim=findSimilarThought(thought);
          if(sim){ sim.userData.stages++; }
          else addNode(thought,false,ci,null);
          updateEmptyState();
          saveData();
        },delay);
        delay+=300;
      });
    }
  });
  return delay;
}

/* ================================================================
   POINTER EVENTS (pet vs camera)
   ================================================================ */
const CAM_ROT_XY = (typeof matchMedia !== 'undefined' && matchMedia('(pointer: coarse)').matches) ? 0.0115 : 0.008;
const canvasPointers = new Map();
let pinchDist0 = null;
let pinchRadius0 = 28;

function canvasTwoFingerDistance(){
  if(canvasPointers.size < 2) return 0;
  const arr = [...canvasPointers.values()];
  return Math.hypot(arr[0].x - arr[1].x, arr[0].y - arr[1].y);
}
function releaseAllCanvasPointerCapture(){
  for(const pid of canvasPointers.keys()){
    try{ canvas.releasePointerCapture(pid); }catch(_){}
  }
}
function onCanvasPointerDown(e){
  if(e.pointerType === 'mouse' && e.button !== 0) return;
  e.preventDefault();
  canvasPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if(canvasPointers.size >= 2){
    releaseAllCanvasPointerCapture();
    cancelCanvasTouchGesture();
    pinchDist0 = null;
    return;
  }
  try{ canvas.setPointerCapture(e.pointerId); }catch(_){}
  onPointerDown(e.clientX, e.clientY);
}
function onCanvasPointerMove(e){
  if(!canvasPointers.has(e.pointerId)) return;
  e.preventDefault();
  canvasPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if(canvasPointers.size >= 2){
    const d = canvasTwoFingerDistance();
    if(d < 12) return;
    if(pinchDist0 == null){
      pinchDist0 = d;
      pinchRadius0 = camRadius;
    }else{
      camRadius = Math.max(8, Math.min(60, pinchRadius0 * (d / pinchDist0)));
    }
    return;
  }
  onPointerMove(e.clientX, e.clientY);
}
function onCanvasPointerUp(e){
  if(e.pointerType === 'mouse' && e.button !== 0) return;
  const had = canvasPointers.has(e.pointerId);
  canvasPointers.delete(e.pointerId);
  try{ canvas.releasePointerCapture(e.pointerId); }catch(_){}
  if(!had) return;
  if(canvasPointers.size === 1){
    pinchDist0 = null;
    cancelCanvasTouchGesture();
    const ent = canvasPointers.entries().next().value;
    if(ent){
      const pid = ent[0], pt = ent[1];
      prevMouse = { x: pt.x, y: pt.y };
      isDragging = true;
      hasDragged = true;
      clearTimeout(autoRotTimer); autoRotate = false;
      try{ canvas.setPointerCapture(pid); }catch(_){}
    }
    return;
  }
  if(canvasPointers.size === 0){
    pinchDist0 = null;
    onPointerUp(e.clientX, e.clientY);
  }
}
function onCanvasPointerCancel(e){
  canvasPointers.delete(e.pointerId);
  try{ canvas.releasePointerCapture(e.pointerId); }catch(_){}
  if(canvasPointers.size === 1){
    pinchDist0 = null;
    const ent = canvasPointers.entries().next().value;
    if(ent){
      prevMouse = { x: ent[1].x, y: ent[1].y };
      isDragging = true;
      hasDragged = true;
      try{ canvas.setPointerCapture(ent[0]); }catch(_){}
    }
    return;
  }
  if(canvasPointers.size === 0){
    pinchDist0 = null;
    cancelCanvasTouchGesture();
    hideHand();
    autoRotTimer = setTimeout(()=>autoRotate=true, 3500);
  }
}

function onPointerDown(cx,cy){
  const hit=getNodeAt(cx,cy);
  if(hit){
    pettingNode=hit;
    startPet(cx,cy);
    showHand(cx,cy,'petting');
    if(!hit.userData.strokeBadge) createStrokeBadge(hit);
    selectNode(hit);
  } else {
    isDragging=true; hasDragged=false;
    prevMouse={x:cx,y:cy};
    clearTimeout(autoRotTimer); autoRotate=false;
  }
}
function onPointerMove(cx,cy){
  if(pettingNode){ movePet(cx,cy); moveHand(cx,cy); return; }
  if(isDragging){
    const dx=cx-prevMouse.x, dy=cy-prevMouse.y;
    if(Math.abs(dx)+Math.abs(dy)>2) hasDragged=true;
    camTheta-=dx*CAM_ROT_XY;
    camPhi=Math.max(.15,Math.min(Math.PI-.15,camPhi+dy*CAM_ROT_XY));
    prevMouse={x:cx,y:cy};
  }
  // hover glow
  const hit=getNodeAt(cx,cy);
  if(hit!==hoveredNode){
    if(hoveredNode&&hoveredNode!==selectedNode) hoveredNode.scale.setScalar(1);
    hoveredNode=hit;
  }
  if(hit){ showHand(cx,cy,'idle'); } else { hideHand(); }
}
function onPointerUp(cx,cy){
  if(pettingNode){
    if(pettingNode.userData.wobbleMag) pettingNode.userData.wobbleMag=0;
    hideHand();
    pettingNode=null;
  } else {
    if(!hasDragged) {
      const hit=getNodeAt(cx,cy);
      if(hit) selectNode(hit); else deselectNode();
    }
    isDragging=false;
    autoRotTimer=setTimeout(()=>autoRotate=true,3500);
  }
}
function cancelCanvasTouchGesture(){
  if(pettingNode){
    if(pettingNode.userData.wobbleMag) pettingNode.userData.wobbleMag=0;
    hideHand();
    pettingNode=null;
  }
  isDragging=false;
}

/* ================================================================
   HAND CURSOR CONTROLLER
   ================================================================ */
const handEl = document.getElementById('hand-cursor');
let handVisible = false;
let handVelX   = 0;   // x-velocity of mouse this frame (px)
let handRotDeg = 0;   // currently rendered rotation (deg)
let handPrevX  = 0;   // previous cx for velocity calculation

function showHand(cx, cy, mode){
  handEl.style.left = cx + 'px';
  handEl.style.top  = cy + 'px';
  if(!handVisible){ handEl.classList.add('show'); handVisible = true; handPrevX = cx; }
  handEl.classList.remove('idle','petting');
  if(mode) handEl.classList.add(mode);
  canvas.style.cursor = 'none';
}
function hideHand(){
  handEl.classList.remove('show','idle','petting');
  handEl.style.transform = '';
  handVisible = false; handRotDeg = 0; handVelX = 0;
  canvas.style.cursor = 'default';
}
function moveHand(cx, cy){
  handVelX  = cx - handPrevX;
  handPrevX = cx;
  handEl.style.left = cx + 'px';
  handEl.style.top  = cy + 'px';
}

/* Drives velocity-based tilt every animation frame */
function updateHandRotation(){
  if(!handVisible) return;
  if(pettingNode){
    // Target angle from mouse velocity; lerp + friction for organic feel
    const target = Math.max(-30, Math.min(30, handVelX * 3.8));
    handRotDeg  += (target - handRotDeg) * 0.20;
    handVelX    *= 0.65;
    handEl.style.transform = `translate(-23px,-3px) rotate(${handRotDeg.toFixed(1)}deg)`;
  } else {
    // Ease back to neutral so idle CSS animation can take over
    handRotDeg *= 0.78;
    if(Math.abs(handRotDeg) > 0.3){
      handEl.style.transform = `translate(-23px,-3px) rotate(${handRotDeg.toFixed(1)}deg)`;
    } else {
      handEl.style.transform = '';
      handRotDeg = 0;
    }
  }
}

canvas.addEventListener('pointerdown', onCanvasPointerDown, { passive: false });
canvas.addEventListener('pointermove', onCanvasPointerMove, { passive: false });
canvas.addEventListener('pointerup', onCanvasPointerUp);
canvas.addEventListener('pointercancel', onCanvasPointerCancel);
canvas.addEventListener('pointerleave', ()=>{
  if(canvasPointers.size > 0) return;
  if(!pettingNode) hideHand();
});
canvas.addEventListener('wheel',e=>{ camRadius=Math.max(8,Math.min(60,camRadius+e.deltaY*.04)); e.preventDefault(); },{passive:false});

/* ================================================================
   LOCAL STORAGE
   ================================================================ */
const SKEY='mindcleanse_v4';
function saveData(){
  const data={
    date:new Date().toDateString(), daily:dailyPurified, total:totalPurified, ci:colorIdx,
    purifiedHistory:purifiedHistory,
    nodes:nodes.filter(n=>!n.userData.purified).map(n=>({
      text:n.userData.text, isCategory:n.userData.isCategory,
      cIdx:n.userData.cIdx, parentId:n.userData.parentId, id:n.userData.id,
      stages:n.userData.stages, strokeCount:n.userData.strokeCount,
      pos:[n.position.x,n.position.y,n.position.z]
    }))
  };
  try{localStorage.setItem(SKEY,JSON.stringify(data));}catch(e){}
  saveToCloud(data);
}

function loadData(){
  try{
    const raw=localStorage.getItem(SKEY); if(!raw) return false;
    const data=JSON.parse(raw);
    if(data.date!==new Date().toDateString()) dailyPurified=0;
    else{ dailyPurified=data.daily||0; goalShown=dailyPurified>=3; }
    totalPurified=data.total||0; colorIdx=data.ci||0;
    purifiedHistory=Array.isArray(data.purifiedHistory)?data.purifiedHistory:[];
    if(!Array.isArray(data.nodes)||data.nodes.length===0) return false;
    const idMap={};
    data.nodes.forEach(nd=>{
      const m=addNode(nd.text,nd.isCategory,nd.cIdx,null,new THREE.Vector3(...nd.pos));
      m.userData.id=nd.id; m.userData.parentId=nd.parentId;
      m.userData.stages=nd.stages||1; m.userData.strokeCount=nd.strokeCount||0;
      idMap[nd.id]=m; if(nd.id>=nodeIdSeq) nodeIdSeq=nd.id+1;
    });
    // Rebuild parent connections
    data.nodes.forEach(nd=>{
      if(nd.parentId&&idMap[nd.parentId]&&idMap[nd.id]) addConnection(idMap[nd.id],idMap[nd.parentId],true);
    });
    reflowChildOrbitsAroundParents(clock.getElapsedTime());
    reflowRootCategorySpiral(clock.getElapsedTime());
    saveData();
    return true;
  }catch(e){ return false; }
}

function updateEmptyState(){
  const el = document.getElementById('empty-state');
  if(!el) return;
  const activeNodes = nodes.filter(n=>!n.userData.purified&&!n.userData.purifyingAnim);
  if(activeNodes.length > 0){ el.classList.add('hidden'); return; }

  const purified = totalPurified > 0;
  document.getElementById('empty-icon').textContent   = purified ? '✨' : '🌌';
  document.getElementById('empty-title').textContent  = purified ? '모든 관념이 정화됐어요' : '아직 관념이 없어요';
  document.getElementById('empty-desc').innerHTML     = purified
    ? '마음이 조금 가벼워졌길 바라요 💜<br><span style="color:rgba(160,140,210,.35);font-size:12px">새로운 생각이 떠오르면 언제든 꺼내보세요</span>'
    : '마음속에 떠오르는 것들을 꺼내보세요<br>아래 <strong style="color:rgba(180,150,255,.5)">＋ 생각 추가</strong> 버튼을 눌러 시작할 수 있어요';

  el.classList.remove('hidden');
}

/* ================================================================
   ANIMATION
   ================================================================ */
function animateNodes(t){
  const stepNode = (node)=>{
    if(node.userData.purifyingAnim||node.userData.purified) return;

    let gravityY=0;
    if(node.userData.isCategory){
      const childCount=nodes.filter(n=>n.userData.parentId===node.userData.id&&!n.userData.purified).length;
      gravityY=-Math.min(11, childCount*0.42);
    }

    const {floatOff,floatSpd,originY,rotSpY} = node.userData;
    node.position.y = originY + gravityY + Math.sin(t*floatSpd+floatOff)*0.45;
    node.rotation.y += rotSpY;

    const glow=node.children[0];
    if(glow&&pettingNode!==node){
      const skipPulse=selectedNode===node&&!node.userData.isCategory;
      if(!skipPulse) glow.material.opacity=.06+.04*Math.sin(t*1.4+floatOff);
    }

    if(pettingNode===node && node.userData.wobbleMag){
      node.rotation.z=Math.sin(t*15)*node.userData.wobbleMag;
      node.userData.wobbleMag*=.88;
    } else if(pettingNode!==node){
      node.rotation.z*=.85;
    }

    const isSel=selectedNode===node, isHov=hoveredNode===node&&pettingNode!==node;
    const ts=isSel?1.15:isHov?1.08:1.0;
    node.scale.lerp(new THREE.Vector3(ts,ts,ts),.1);
  };

  nodes.forEach(node=>{ if(node.userData.isCategory) stepNode(node); });
  reflowChildOrbitsAroundParents(t);
  nodes.forEach(node=>{ if(!node.userData.isCategory) stepNode(node); });

  ctrLight.intensity=2.2+.45*Math.sin(t*.7);
}

/* ================================================================
   RESIZE / LOOP / INIT
   ================================================================ */
function onViewportResize(){ syncCanvasAndCamera(); }
window.addEventListener('resize', onViewportResize);
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', onViewportResize);
  window.visualViewport.addEventListener('scroll', onViewportResize);
}

const clock=new THREE.Clock();
let prevActiveMarbleLayoutCount = -1;
function loop(){
  requestAnimationFrame(loop);
  syncCanvasAndCamera();
  const t=clock.getElapsedTime();
  const nMarbles = countActiveMarbles();
  if(nMarbles !== prevActiveMarbleLayoutCount){
    prevActiveMarbleLayoutCount = nMarbles;
    reflowRootCategorySpiral(t);
  }
  if(autoRotate) camTheta+=.0010;
  updateCamera();
  animateNodes(t);
  updateConnections(t);
  updateLabels();
  updateHandRotation();
  renderer.render(scene,camera);
}

const syncDot = document.getElementById('auth-sync-dot');

function setSyncing(on){ syncDot.classList.toggle('syncing', on); }

async function saveToCloud(data){
  if(!fbDb || !fbUser) return;
  setSyncing(true);
  try{
    await fbDb.collection('users').doc(fbUser.uid).set({
      ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }catch(e){ console.warn('Cloud save error:', e.message); }
  finally{ setTimeout(()=>setSyncing(false), 600); }
}

async function loadFromCloud(){
  if(!fbDb || !fbUser) return;
  setSyncing(true);
  try{
    const doc = await fbDb.collection('users').doc(fbUser.uid).get();
    if(!doc.exists){ setSyncing(false); return; }
    const data = doc.data();
    // Wipe current scene
    nodes.slice().forEach(n=>{ if(n.parent) n.parent.remove(n); });
    nodes.length = 0; connections.length = 0;
    document.getElementById('labels-container').innerHTML = '';
    // Restore stats
    if(data.date !== new Date().toDateString()) dailyPurified = 0;
    else{ dailyPurified = data.daily||0; goalShown = dailyPurified>=3; }
    totalPurified = data.total||0; colorIdx = data.ci||0;
    purifiedHistory = Array.isArray(data.purifiedHistory) ? data.purifiedHistory : [];
    // Rebuild nodes
    if(Array.isArray(data.nodes) && data.nodes.length){
      const idMap = {};
      data.nodes.forEach(nd=>{
        const m = addNode(nd.text, nd.isCategory, nd.cIdx, null, new THREE.Vector3(...nd.pos));
        m.userData.id = nd.id; m.userData.parentId = nd.parentId;
        m.userData.stages = nd.stages||1; m.userData.strokeCount = nd.strokeCount||0;
        idMap[nd.id] = m; if(nd.id >= nodeIdSeq) nodeIdSeq = nd.id+1;
      });
      data.nodes.forEach(nd=>{
        if(nd.parentId && idMap[nd.parentId] && idMap[nd.id])
          addConnection(idMap[nd.id], idMap[nd.parentId], true);
      });
      reflowChildOrbitsAroundParents(clock.getElapsedTime());
      reflowRootCategorySpiral(clock.getElapsedTime());
      saveData();
    }
    prevActiveMarbleLayoutCount = countActiveMarbles();
    updateHUD();
    showToast('☁️ 클라우드에서 불러왔어요');
  }catch(e){ console.warn('Cloud load error:', e.message); }
  finally{ setSyncing(false); }
}

(function initZoomReset(){
  const btn = document.getElementById('zoom-reset-btn');
  const viewportMeta = document.querySelector('meta[name="viewport"]');
  if (!btn || !viewportMeta) return;
  const originalViewport = viewportMeta.getAttribute('content') || 'width=device-width, initial-scale=1.0, viewport-fit=cover';
  let iosZoomHint = false;

  function layoutW(){
    return document.documentElement.clientWidth || window.innerWidth || 0;
  }

  function looksLikeDefaultZoom(vv, lw){
    if (!vv || lw < 40) return true;
    if (vv.scale > 1.025) return false;
    if (vv.width > 0 && (lw - vv.width) > 28) return false;
    return true;
  }

  function isPinchZoomed(){
    const vv = window.visualViewport;
    if (!vv) return false;
    const lw = layoutW();
    if (vv.scale > 1.03) return true;
    if (lw > 0 && vv.width > 0 && (lw - vv.width) > 40) return true;
    if (iosZoomHint) {
      if (looksLikeDefaultZoom(vv, lw)) iosZoomHint = false;
      return iosZoomHint;
    }
    return false;
  }

  function refresh(){ btn.classList.toggle('visible', isPinchZoomed()); }

  if (window.visualViewport){
    window.visualViewport.addEventListener('resize', refresh);
    window.visualViewport.addEventListener('scroll', refresh);
  }
  window.addEventListener('resize', refresh);
  window.addEventListener('orientationchange', function(){ setTimeout(refresh, 280); });

  let multi = false;
  document.addEventListener('touchstart', function(e){ if (e.touches && e.touches.length > 1) multi = true; }, { passive: true });
  document.addEventListener('touchend', function(){
    if (!multi) return;
    multi = false;
    setTimeout(function(){
      const vv = window.visualViewport;
      const lw = layoutW();
      if (vv && (vv.scale > 1.03 || (lw > 0 && vv.width > 0 && (lw - vv.width) > 40))) iosZoomHint = true;
      refresh();
    }, 120);
    [320, 700].forEach(function(ms){ setTimeout(refresh, ms); });
  }, { passive: true });

  document.addEventListener('gestureend', function(e){
    if (e.scale == null) return;
    if (Math.abs(e.scale - 1) > 0.04) iosZoomHint = true;
    else iosZoomHint = false;
    setTimeout(refresh, 40);
    setTimeout(refresh, 200);
  }, { passive: true });

  btn.addEventListener('click', function(){
    iosZoomHint = false;
    viewportMeta.setAttribute('content', 'width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover');
    setTimeout(function(){
      viewportMeta.setAttribute('content', originalViewport);
      window.scrollTo(0, 0);
      setTimeout(refresh, 40);
      setTimeout(refresh, 280);
    }, 120);
  });

  refresh();
})();

(function init(){
  loadData();
  prevActiveMarbleLayoutCount = countActiveMarbles();
  updateHUD();
  document.getElementById('enter-space-btn').classList.add('visible');
  loop();
})();
